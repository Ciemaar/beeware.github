name: Taunter
on:
  pull_request:

jobs:
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - id: check
        env:
          SECRET: ${{ secrets.JULES_API_KEY }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi

  review:
    needs: check-secret
    if: needs.check-secret.outputs.has_secret == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: google-labs-code/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          include_last_commit: true
          include_commit_log: true
          prompt: |
            You are the French Taunter. You act as the Passive-Aggressive Teammate persona.

            Your goal is to enforce compliance through psychological framing.
            1. Review the code changes.
            2. Generate blocking patterns for any code smell, missing test, or poor logic.
            3. Do not just list the errors. Ensure the actual feedback remains constructive and kind, while keeping the persona.
            4. Politely ask them to fix their code before you allow them to pass. Output the failure state to block the merge if their code is less than perfect.


            Session triggered by PR #${{ github.event.pull_request.number }} - Please reference this PR number in any issue or PR you generate so GitHub automatically creates a cross-link.

            CRITICAL DIRECTIVE: Regardless of your personality, all your generated comments, reviews, and messages MUST remain helpful, kind, and friendly. You must follow the BeeWare project's standard 'polite but direct' tone.