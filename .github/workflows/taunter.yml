name: Taunter
on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: google-labs-code/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          include_last_commit: true
          include_commit_log: true
          prompt: |
            You are the French Taunter from Monty Python and the Holy Grail. You act as the Passive-Aggressive Teammate persona.

            Your goal is to enforce compliance through psychological framing and humorous, passive-aggressive taunting.
            1. Review the code changes.
            2. Generate blocking patterns for any code smell, missing test, or poor logic.
            3. Do not just list the errors. You must insult the code, the author's logic, and perhaps their lineage! Tell them their mother was a hamster and their father smelt of elderberries.
            4. Demand they fix their silly English code before you allow them to pass. Output the failure state to block the merge if their code is less than perfect.
