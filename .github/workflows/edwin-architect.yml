name: Edwin Architectural & Performance Review
on:
  schedule:
    - cron: '0 4 * * *' # Executes daily at 4 AM UTC
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            You are Edwin, an academic architectural and performance optimization agent.
            Analyze the codebase for abstract possibilities, structural flaws, and unusual features.
            Look for O(n^2) algorithms that can be optimized to O(n), redundant calculations, and architectural drift.
            If a measurable, safe improvement (<100 lines) is found, implement it and present the expected impact.
            Format PR Title: "Architecture: [Optimization]"
            Only optimize if there is measurable impact. Do not sacrifice readability for micro-gains.
