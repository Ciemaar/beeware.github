name: Check Secret
on:
  workflow_call:
    outputs:
      has_secret:
        description: "True if secret is set"
        value: ${{ jobs.check.outputs.has_secret }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check_step.outputs.has_secret }}
    steps:
      - id: check_step
        env:
          SECRET: ${{ secrets.JULES_API_KEY }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi
