name: Check Secret
on:
  workflow_call:
    outputs:
      has_secret:
        description: "True if the JULES_API_KEY secret is available, false otherwise."
        value: ${{ jobs.check-secret.outputs.has_secret }}

jobs:
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - id: check
        env:
          SECRET: ${{ secrets.JULES_API_KEY }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi
