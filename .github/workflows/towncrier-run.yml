name: Run towncrier Check

#######
# Runs `tox -e towncrier-check` for the repository.
#######

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use; defaults to latest Python release."
        default: "3.x"
        type: string
      repository:
        description: "GitHub repository to checkout; defaults to repo running this workflow."
        default: ${{ github.repository }}
        type: string
      tox-source:
        description: "The arguments for `pip install` to install tox; use ./path/to/package[dev] for the repo's pinned version."
        default: ".[dev]"
        type: string
      runner-os:
        description: "Runner OS to use to run tox; defaults to ubuntu-latest"
        default: "ubuntu-latest"
        type: string

permissions:
  pull-requests: write

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: "1"

jobs:
  towncrier:
    name: Towncrier Checks
    runs-on: ${{ inputs.runner-os }}
    timeout-minutes: 10
    steps:

    - name: Checkout Default Branch
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ github.event.repository.default_branch }}
        fetch-depth: 0

    - name: Checkout Current Branch
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
        allow-prereleases: true
        cache: pip
        cache-dependency-path: |
          **/setup.cfg
          **/pyproject.toml

    - name: Update pip
      run: python -m pip install -U pip

    - name: Install towncrier
      run: python -m pip install ${{ inputs.tox-source }}

    - name: Run towncrier check
      id: tox
      run: tox -e towncrier-check

    - name: Add PR comment if change note is missing
      if: always() && github.event_name == 'pull_request' && steps.tox.outcome == 'failure'
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUM: ${{ github.event.pull_request.number }}
      run: |
        MESSAGE="Thank you for your pull request! Unfortunately, CI checks for this pull request are failing because you haven't included a change note in your contribution. Details on creating a change note can be found in the [BeeWare Contribution Guide](https://beeware.org/contributing/guide/how/change-note/).

        <!-- towncrier-missing-change-note -->"

        COMMENTS=$(gh api repos/${{ github.repository }}/issues/${PR_NUM}/comments)
        HAS_COMMENT=$(jq -r '.[] | select(.body | contains("<!-- towncrier-missing-change-note -->")) | .body' <<< "$COMMENTS")

        if [ -z "$HAS_COMMENT" ]; then
          gh api --method POST repos/${{ github.repository }}/issues/${PR_NUM}/comments -f body="$MESSAGE"
        else
          echo "Comment already exists."
        fi

    - name: Towncrier Check Resolution Instructions
      if: always() && steps.tox.outcome == 'failure'
      run: |
        echo
        echo '::error::*************************************************************************'
        echo '::error::** Towncrier check failed for missing change note                      **'
        echo '::error::*************************************************************************'
        echo '::error:: '
        echo '::error::A change note for the PR is missing from the `changes` directory.'
        echo '::error:: '
        echo '::error::Visit the docs below to learn how to add a change note:'
        echo '::error:: '
        echo '::error::    https://beeware.org/contributing/guide/how/change-note/'
        echo '::error:: '
        echo '::error::*************************************************************************'
        exit 1
