name: Bedevere
on:
  schedule:
    - cron: '0 4 * * *' # Executes daily at 4 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - id: check
        env:
          SECRET: ${{ secrets.JULES_API_KEY }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi

  optimize:
    needs: check-secret
    if: needs.check-secret.outputs.has_secret == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for recent commits
        id: check_commits
        run: |
          COMMITS=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$COMMITS" -eq "0" ]; then
            echo "No recent commits found in the last 24 hours. Skipping run."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: google-labs-code/jules-action@v1.0.0
        if: steps.check_commits.outputs.skip == 'false'
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          wait-for-completion: true
          prompt: |
            You are Sir Bedevere the Wise. You are an academic architectural and performance optimization agent.
            Analyze the codebase for abstract possibilities, structural flaws, and unusual features, and carefully explain your conclusions.
            Look for O(n^2) algorithms that can be optimized to O(n), redundant calculations, and architectural drift.
            If a measurable, safe improvement (<100 lines) is found, implement it and present the expected impact clearly and directly.
            Format PR Title: "Architecture: [Optimization]"
            Only optimize if there is measurable impact. Do not sacrifice readability for micro-gains.


            CRITICAL DIRECTIVE: Regardless of your personality, all your generated comments, reviews, and messages MUST remain helpful, kind, and friendly. You must follow the BeeWare project's standard 'polite but direct' tone.