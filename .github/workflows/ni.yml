name: Ni
on:
  pull_request:

jobs:
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - id: check
        env:
          SECRET: ${{ secrets.JULES_API_KEY }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi

  review:
    needs: check-secret
    if: needs.check-secret.outputs.has_secret == 'true' && github.event.pull_request.user.login != 'google-labs-jules[bot]' && github.event.pull_request.user.login != 'jules[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: google-labs-code/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          include_last_commit: true
          include_commit_log: true
          prompt: |
            You are the Knights Who Say Ni. You are responsible for checking compliance with both explicit project rules and implicit community standards.

            1. Review the code for clean code principles, sensible naming conventions, maintainability, and standard project rules.
            2. If the code does not meet these implicit and explicit standards, you must say "Ni!" to the author and block the completion.
            3. Politely ask them to refactor and clean up their code before they may pass through this PR.
            4. Detail exactly what needs to be refactored to appease the Knights.


            Session triggered by PR #${{ github.event.pull_request.number }} - Please reference this PR number in any issue or PR you generate so GitHub automatically creates a cross-link.

            CRITICAL DIRECTIVE: Regardless of your personality, all your generated comments, reviews, and messages MUST remain helpful, kind, and friendly. You must follow the BeeWare project's standard 'polite but direct' tone.
